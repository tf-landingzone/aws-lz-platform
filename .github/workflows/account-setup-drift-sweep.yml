# =============================================================================
# Account Setup Drift Sweep — Python Orchestrator (replaces matrix workflow)
# =============================================================================
# Runs scripts/deploy_accounts.py on a single runner. The Python deployer
# fans out across accounts via ThreadPoolExecutor — bypasses the GitHub
# matrix 256-job ceiling and avoids per-job runner provisioning cost
# (~30-60s saved per account).
#
# Triggers:
#   - schedule: nightly 02:00 UTC (drift remediation)
#   - workflow_dispatch: manual sweep with tunable concurrency + filters
# =============================================================================

name: Account Setup Drift Sweep

on:
  workflow_dispatch:  # MANUAL ONLY — schedule disabled
    inputs:
      max_parallel:
        description: "Concurrent terraform workers (default 50)"
        required: false
        type: string
        default: "50"
      ou_filter:
        description: "Only sweep accounts in this OU (blank = all)"
        required: false
        type: string
        default: ""
      env_filter:
        description: "Only sweep this environment (blank = all)"
        required: false
        type: choice
        default: ""
        options:
          - ""
          - production
          - staging
          - development
          - sandbox
      plan_only:
        description: "Plan only, do not apply"
        required: false
        type: boolean
        default: false

concurrency:
  group: account-setup-drift-sweep
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  sweep:
    name: Sweep accounts
    runs-on: ubuntu-latest
    timeout-minutes: 360  # cap; deployer exits earlier when work is done
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "~> 1.9"
          terraform_wrapper: false

      - name: Run fleet deployer
        env:
          MAX_PARALLEL: ${{ inputs.max_parallel || '50' }}
          OU_FILTER: ${{ inputs.ou_filter }}
          ENV_FILTER: ${{ inputs.env_filter }}
          PLAN_ONLY: ${{ inputs.plan_only }}
          DEPLOY_RUN_STATE_TABLE: ${{ secrets.DEPLOY_RUN_STATE_TABLE || 'acme-lz-deploy-run-state' }}
        run: |
          set -euo pipefail
          ARGS=(--all --max-parallel "$MAX_PARALLEL")
          if [[ -n "${OU_FILTER:-}" ]]; then
            ARGS+=(--ou "$OU_FILTER")
          fi
          if [[ -n "${ENV_FILTER:-}" ]]; then
            ARGS+=(--env "$ENV_FILTER")
          fi
          if [[ "${PLAN_ONLY:-false}" == "true" ]]; then
            ARGS+=(--plan-only)
          fi
          python3 scripts/deploy_accounts.py "${ARGS[@]}"

      - name: Upload deployment report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deploy-report
          path: |
            deploy-report.json
            logs/
          retention-days: 30

      - name: Alert on drift detected
        if: always()
        env:
          TOPIC_ARN: ${{ secrets.OPS_NOTIFICATION_TOPIC_ARN }}
          DRIFT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ ! -f deploy-report.json ]]; then
            echo "No deploy report; skipping drift alert."
            exit 0
          fi

          DRIFT_MSG=$(python3 scripts/generate_drift_report.py)

          if [[ -z "$DRIFT_MSG" ]]; then
            echo "No drift detected — all accounts clean."
            exit 0
          fi

          echo "Drift detected:"
          echo "$DRIFT_MSG"

          # Write to job summary
          {
            echo "## Drift Detected"
            echo ""
            echo '```'
            echo "$DRIFT_MSG"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          # Publish to SNS
          if [[ -z "${TOPIC_ARN:-}" ]]; then
            echo "OPS_NOTIFICATION_TOPIC_ARN not set; skipping SNS publish."
            exit 0
          fi

          DRIFTED_COUNT=$(python3 -c "import json; r=json.load(open('deploy-report.json')); print(sum(1 for x in r.get('results',[]) if x['status'] in ('applied','planned')))")
          aws sns publish \
            --topic-arn "$TOPIC_ARN" \
            --subject "[LZ] Drift detected: ${DRIFTED_COUNT} account(s)" \
            --message "$DRIFT_MSG"

  notify-failure:
    name: Notify on failure
    needs: sweep
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Publish to SNS
        env:
          TOPIC_ARN: ${{ secrets.OPS_NOTIFICATION_TOPIC_ARN }}
        run: |
          if [[ -z "${TOPIC_ARN:-}" ]]; then
            echo "OPS_NOTIFICATION_TOPIC_ARN not set; skipping SNS publish."
            exit 0
          fi
          aws sns publish \
            --topic-arn "$TOPIC_ARN" \
            --subject "[LZ] Drift sweep failed" \
            --message "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
