# =============================================================================
# sync-runtime-to-s3.yml
# =============================================================================
# Syncs the Terraform stack files, modules, policies, and scripts to S3 so
# that Fargate tasks always get the latest code WITHOUT requiring a Docker
# image rebuild.
#
# The tf-executor Docker image contains ONLY the runtime (terraform binary,
# Python, awscli, entrypoint.sh). All code artefacts live in S3 under:
#
#   s3://<TF_STATE_BUCKET>/runtime/
#     stack/      ← stacks/account-setup/*.tf + .terraform.lock.hcl
#     modules/    ← modules/account-baseline/**
#     policies/   ← policies/*.json
#     scripts/    ← resolve_account.py, hcl_writer.py
#
# When a Fargate task starts, entrypoint.sh runs `aws s3 sync` from this
# prefix before running Terraform. Code changes take effect on the NEXT
# Fargate task execution — no image rebuild, no deployment delay.
#
# Triggers:
#   - Push to main: any change in the monitored paths across the 4 repos
#   - workflow_dispatch: manual sync (e.g. after emergency hotfix)
#
# Called by cross-repo notify when aws-tf-modules or aws-lz-policies changes.
# =============================================================================

name: Sync Runtime to S3

on:
  push:
    branches: [main]
    paths:
      - "stacks/account-setup/**"
      - "account_policy_map.yaml"

  # Triggered from aws-tf-modules and aws-lz-policies via repository_dispatch
  repository_dispatch:
    types: [modules-updated, policies-updated]

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (show what would change, do not upload)"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  RUNTIME_PREFIX: runtime

concurrency:
  group: sync-runtime-to-s3
  cancel-in-progress: false   # never cancel mid-sync; could leave S3 in partial state

jobs:
  sync:
    name: Sync runtime artefacts to S3
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout aws-lz-platform
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout aws-tf-modules (Terraform modules)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: tf-landingzone/aws-tf-modules
          token: ${{ secrets.PLATFORM_WORKFLOW_TOKEN }}
          path: aws-tf-modules

      - name: Checkout aws-lz-policies (IAM policy files)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: tf-landingzone/aws-lz-policies
          token: ${{ secrets.PLATFORM_WORKFLOW_TOKEN }}
          path: aws-lz-policies

      - name: Checkout aws-lz-accounts (resolve_account.py + hcl_writer.py)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: tf-landingzone/aws-lz-accounts
          token: ${{ secrets.PLATFORM_WORKFLOW_TOKEN }}
          path: aws-lz-accounts

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync stack files → S3
        env:
          BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          DRY_RUN: ${{ inputs.dry_run == true && '--dryrun' || '' }}
        run: |
          set -euo pipefail
          echo "Syncing stacks/account-setup/ → s3://${BUCKET}/${RUNTIME_PREFIX}/stack/"
          aws s3 sync \
            stacks/account-setup/ \
            "s3://${BUCKET}/${RUNTIME_PREFIX}/stack/" \
            --region "${AWS_REGION}" \
            --delete \
            --exclude ".terraform/*" \
            --exclude "*.tfplan" \
            ${DRY_RUN}

      - name: Sync modules → S3
        env:
          BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          DRY_RUN: ${{ inputs.dry_run == true && '--dryrun' || '' }}
        run: |
          set -euo pipefail
          echo "Syncing modules/account-baseline/ → s3://${BUCKET}/${RUNTIME_PREFIX}/modules/account-baseline/"
          aws s3 sync \
            aws-tf-modules/modules/account-baseline/ \
            "s3://${BUCKET}/${RUNTIME_PREFIX}/modules/account-baseline/" \
            --region "${AWS_REGION}" \
            --delete \
            ${DRY_RUN}

      - name: Sync policies → S3
        env:
          BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          DRY_RUN: ${{ inputs.dry_run == true && '--dryrun' || '' }}
        run: |
          set -euo pipefail
          echo "Syncing policies/ → s3://${BUCKET}/${RUNTIME_PREFIX}/policies/"
          aws s3 sync \
            aws-lz-policies/policies/ \
            "s3://${BUCKET}/${RUNTIME_PREFIX}/policies/" \
            --region "${AWS_REGION}" \
            --delete \
            --include "*.json" \
            ${DRY_RUN}

      - name: Sync scripts → S3
        env:
          BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          DRY_RUN: ${{ inputs.dry_run == true && '--dryrun' || '' }}
        run: |
          set -euo pipefail
          echo "Syncing scripts/ → s3://${BUCKET}/${RUNTIME_PREFIX}/scripts/"
          aws s3 sync \
            aws-lz-accounts/scripts/ \
            "s3://${BUCKET}/${RUNTIME_PREFIX}/scripts/" \
            --region "${AWS_REGION}" \
            --delete \
            --include "*.py" \
            ${DRY_RUN}

      - name: Sync policy map → S3
        env:
          BUCKET: ${{ secrets.TF_STATE_BUCKET }}
          DRY_RUN: ${{ inputs.dry_run == true && '--dryrun' || '' }}
        run: |
          set -euo pipefail
          echo "Uploading account_policy_map.yaml → s3://${BUCKET}/config/account_policy_map.yaml"
          aws s3 cp \
            account_policy_map.yaml \
            "s3://${BUCKET}/config/account_policy_map.yaml" \
            --region "${AWS_REGION}" \
            ${DRY_RUN}

      - name: Summary
        if: inputs.dry_run != true
        run: |
          {
            echo "## Runtime Sync Complete"
            echo ""
            echo "| Artefact | S3 Path |"
            echo "|----------|---------|"
            echo "| TF stack | \`s3://${{ secrets.TF_STATE_BUCKET }}/${RUNTIME_PREFIX}/stack/\` |"
            echo "| Modules  | \`s3://${{ secrets.TF_STATE_BUCKET }}/${RUNTIME_PREFIX}/modules/\` |"
            echo "| Policies | \`s3://${{ secrets.TF_STATE_BUCKET }}/${RUNTIME_PREFIX}/policies/\` |"
            echo "| Scripts  | \`s3://${{ secrets.TF_STATE_BUCKET }}/${RUNTIME_PREFIX}/scripts/\` |"
            echo ""
            echo "All new Fargate tasks will use these artefacts immediately."
            echo "No image rebuild required."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure
        if: failure()
        env:
          TOPIC_ARN: ${{ secrets.OPS_NOTIFICATION_TOPIC_ARN }}
        run: |
          if [[ -z "${TOPIC_ARN:-}" ]]; then exit 0; fi
          aws sns publish \
            --topic-arn "$TOPIC_ARN" \
            --subject "[LZ] Runtime sync to S3 FAILED" \
            --message "Fargate tasks may run stale code. Fix: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
