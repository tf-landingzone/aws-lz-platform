# =============================================================================
# Account Deploy — Reusable Workflow (aws-lz-platform)
# =============================================================================
# Called by aws-lz-accounts/.github/workflows/account-setup.yml
#
# Pre-condition: the CALLER must upload a "account-tfvars" artifact containing
# terraform.tfvars BEFORE calling this workflow. The plan job downloads it.
#
# Inputs:
#   account_id    — 12-digit AWS account ID (validated by caller)
#   account_name  — account name (e.g. prod-app-001)
#   environment   — production | staging | development | sandbox | auto
#   auto_approve  — true = skip the manual approval gate
# =============================================================================

name: Account Deploy (Reusable)

on:
  workflow_call:
    inputs:
      account_id:
        description: "AWS Account ID (12 digits)"
        required: true
        type: string
      account_name:
        description: "Account name (e.g. prod-app-001)"
        required: true
        type: string
      environment:
        description: "Environment tier"
        required: false
        type: string
        default: ""
      auto_approve:
        description: "Apply without manual approval gate"
        required: false
        type: boolean
        default: false
    secrets:
      AWS_ROLE_ARN:
        required: true
      SNS_NOTIFICATION_TOPIC_ARN:
        required: false

env:
  TF_DIR: stacks/account-setup
  AWS_REGION: us-east-1

jobs:
  # ── Terraform Plan ─────────────────────────────────────────────────────────
  plan:
    name: "Plan ${{ inputs.account_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      has_changes: ${{ steps.plan.outputs.has_changes }}

    steps:
      - name: Checkout platform repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download tfvars from caller
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: account-tfvars
          path: ${{ env.TF_DIR }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "~> 1.9"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="key=account-setup/${{ inputs.account_id }}/terraform.tfstate"

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var-file=terraform.tfvars \
            -out=tfplan \
            -detailed-exitcode 2>&1 | tee plan_output.txt || EXIT_CODE=$?

          if [[ "${EXIT_CODE:-0}" == "2" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Plan summary
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "## Terraform Plan — ${{ inputs.account_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Account ID | \`${{ inputs.account_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Account Name | \`${{ inputs.account_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Has Changes | \`${{ steps.plan.outputs.has_changes }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 plan_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifact
        if: steps.plan.outputs.has_changes == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 1

  # ── Terraform Apply ────────────────────────────────────────────────────────
  apply:
    name: "Apply ${{ inputs.account_name }}"
    needs: plan
    if: needs.plan.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.auto_approve == true && 'auto' || 'production' }}

    steps:
      - name: Checkout platform repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download tfvars
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: account-tfvars
          path: ${{ env.TF_DIR }}

      - name: Download plan
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: tfplan
          path: ${{ env.TF_DIR }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_version: "~> 1.9"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform init \
            -backend-config="key=account-setup/${{ inputs.account_id }}/terraform.tfstate"

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Output summary
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "## Account Setup Complete — ${{ inputs.account_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Account ID | \`${{ inputs.account_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Account Name | \`${{ inputs.account_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform output -json >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ── Notify on failure ──────────────────────────────────────────────────────
  notify-failure:
    name: "Notify Failure"
    needs: [plan, apply]
    if: failure()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send failure notification
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="Account Deploy FAILED for ${{ inputs.account_name }} (${{ inputs.account_id }}). See: ${RUN_URL}"

          if [[ -n "${{ secrets.SNS_NOTIFICATION_TOPIC_ARN }}" ]]; then
            aws sns publish \
              --topic-arn "${{ secrets.SNS_NOTIFICATION_TOPIC_ARN }}" \
              --subject "Account Deploy Failed: ${{ inputs.account_name }}" \
              --message "${MESSAGE}" || true
          fi
