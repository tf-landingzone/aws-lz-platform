# =============================================================================
# 03-Networking — VPCs, TGW, VPN, DX, Firewall, DNS, IPAM, RAM
# =============================================================================
# Depends on: 01-organizations (reads OU IDs for RAM sharing)
# This stack creates shared networking and shares via AWS RAM.
# =============================================================================

# ── Core Networking ──────────────────────────────────────────────────────────
networking:
  delete_default_vpcs: false
  ipam: {}
  dhcp_options_sets: {}
  prefix_lists: {}

  vpcs: {}
