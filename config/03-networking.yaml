    #   description: "Main transit gateway"
    #   amazon_side_asn: 64512
    #   auto_accept_shared_attachments: "enable"
    #   route_tables:
    #     default: {}

  transit_gateway_peering: {}
  customer_gateways: {}
  vpn_connections: {}
  dx_gateways: {}
  network_firewalls: {}
  # ── Reference: Centralised Inspection VPC + AWS Network Firewall ──────────
  # Uncomment and adapt CIDR/region/AZ values to your org. Pair with the
  # `inspection_vpc` example under `vpcs:` above. All egress traffic is
