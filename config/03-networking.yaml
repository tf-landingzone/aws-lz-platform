  gateway_load_balancers: {}
  route53_resolver: {}

# ── AWS RAM Sharing ──────────────────────────────────────────────────────────
# Share networking resources (VPCs, TGWs, Subnets, Prefix Lists) with
# workload accounts via AWS Resource Access Manager.
ram_shares: {}
  # shared_networking:
  #   name: "shared-networking"
  #   allow_external_principals: false
  #   # Share with specific OUs or accounts
  #   principals:
  #     - "arn:aws:organizations::111111111111:ou/o-xxxx/ou-xxxx-workloads"
  #   # Resources to share (use resource_type + resource_keys)
  #   resource_arns: []
  #   # Or share specific subnets by key
  #   shared_subnet_keys:
  #     - "shared_services/private_a"
  #   shared_tgw_keys:
  #     - "main"
