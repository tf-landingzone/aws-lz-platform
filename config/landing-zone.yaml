  org_rules: {}
  conformance_packs: {}
  # Org-wide conformance packs deployed to every member account via AWS Config.
  # Templates live under policies/conformance-packs/. Paths are resolved
  # relative to the stack working directory (stacks/landing-zone/).
  org_conformance_packs:
    cis-aws-foundations:
      template_file: ../../policies/conformance-packs/cis-aws-foundations.yaml
      excluded_accounts: []
    nist-800-53-rev5:
      template_file: ../../policies/conformance-packs/nist-800-53-rev5.yaml
      excluded_accounts: []
    pci-dss-v3-2-1:
      template_file: ../../policies/conformance-packs/pci-dss-v3.2.1.yaml
      excluded_accounts: []
  aggregator:
    enabled: false
    # name: "org-aggregator"
