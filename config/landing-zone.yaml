# =============================================================================
# Landing Zone Configuration — Single Source of Truth
# =============================================================================
# This YAML config drives the entire landing zone automation.
# Run:  python3 generate_landing_zone_tfvars.py
# It reads this file and produces stacks/landing-zone/terraform.tfvars.json
# =============================================================================

# ── Global Settings ──────────────────────────────────────────────────────────
global:
  org: "acme"
  program: "lz"
  primary_region: "us-east-1"
  owner: "platform-team"
  cost_center: "CC-1234"
  extra_tags:
    Environment: "management"
    Compliance: "SOC2"

# ── Feature Flags ────────────────────────────────────────────────────────────
features:
  organizations: true
  governance: true
  identity_center: true
  security_baseline: true
  account_baselines: false
  budget_alerts: true
  account_factory_trigger: true
  networking: false
  centralized_logging: true
  config_rules: false
  kms: false
  macie: false
  detective: false
  audit_manager: false
  iam_resources: false
  customizations: false
  control_tower: false
  ssm: false
  backup: false
  cost_reporting: false

# ── Organizations ────────────────────────────────────────────────────────────
organizations:
  manage_organization: false
  feature_set: "ALL"

  organizational_units:
    security:
      name: "Security"
    infrastructure:
      name: "Infrastructure"
    workloads:
      name: "Workloads"
    sandbox:
      name: "Sandbox"
    workloads_prod:
      name: "Production"
      parent_key: "workloads"
    workloads_staging:
      name: "Staging"
      parent_key: "workloads"
    workloads_dev:
      name: "Development"
      parent_key: "workloads"

  # accounts:
  #   log_archive:
  #     name: "log-archive"
  #     email: "aws+log-archive@acme.com"
  #     ou_key: "security"
  #   audit:
  #     name: "audit"
  #     email: "aws+audit@acme.com"
  #     ou_key: "security"
  #   shared_services:
  #     name: "shared-services"
  #     email: "aws+shared@acme.com"
  #     ou_key: "infrastructure"

  # delegated_administrators:
  #   "111111111111":
  #     - "guardduty.amazonaws.com"
  #     - "securityhub.amazonaws.com"

# ── Governance ───────────────────────────────────────────────────────────────
governance:
  service_control_policies:
    deny_regions:
      name: "DenyOutsideAllowedRegions"
      description: "Restrict to us-east-1 and us-west-2 only"
      content_file: "policies/scp_deny_regions.json"
      # Attach to all workload + sandbox OUs; exempts Security/Infrastructure
      target_ou_keys:
        - "workloads_prod"
        - "workloads_staging"
        - "workloads_dev"
        - "sandbox"

    deny_root:
      name: "DenyRootAccount"
      description: "Deny all actions by root user in member accounts"
      content_file: "policies/scp_deny_root.json"
      target_root: true

    security_guardrails:
      name: "SecurityGuardrails"
      description: "Prevent disabling of security services and account operations"
      content_file: "policies/scp_security_guardrails.json"
      target_root: true

  tag_policies: {}
  backup_policies: {}
  ai_services_opt_out_policies: {}

# ── Identity Center ─────────────────────────────────────────────────────────
identity_center:
  group_lookups:
    platform_admins:
      display_name: "AWS-PlatformAdmins"
    developers:
      display_name: "AWS-Developers"
    auditors:
      display_name: "AWS-Auditors"
    readonly:
      display_name: "AWS-ReadOnly"

  permission_sets:
    admin:
      name: "AdministratorAccess"
      description: "Full admin access for platform team"
      session_duration: "PT4H"
      aws_managed_policies:
        - "arn:aws:iam::aws:policy/AdministratorAccess"
    developer:
      name: "DeveloperAccess"
      description: "Power user access for developers"
      session_duration: "PT8H"
      aws_managed_policies:
        - "arn:aws:iam::aws:policy/PowerUserAccess"
    readonly:
      name: "ReadOnlyAccess"
      description: "Audit read-only access"
      session_duration: "PT12H"
      aws_managed_policies:
        - "arn:aws:iam::aws:policy/ReadOnlyAccess"
    security_audit:
      name: "SecurityAudit"
      description: "Security audit access"
      session_duration: "PT12H"
      aws_managed_policies:
        - "arn:aws:iam::aws:policy/SecurityAudit"

  account_assignments: {}
    # Populate after accounts are created with real account IDs:
    # admin_to_mgmt:
    #   permission_set_key: "admin"
    #   principal_name: "platform_admins"
    #   account_ids:
    #     - "111111111111"

  access_control_attributes: []

# ── Security Baseline (Org-Level) ───────────────────────────────────────────
security_baseline:
  org_cloudtrail:
    enabled: true
    trail_name: "acme-org-trail"
    s3_bucket_name: "acme-org-cloudtrail-logs"

  config_aggregator:
    enabled: true
    aggregator_name: "acme-org-config-aggregator"
    all_regions: true

  guardduty_org:
    enabled: true

  securityhub_org:
    enabled: true

  enable_org_access_analyzer: true
  org_access_analyzer_name: "acme-org-access-analyzer"

# ── Budget Alerts & FinOps ───────────────────────────────────────────────────
budget_alerts:
  notification_topics:
    finops:
      name: "acme-finops-alerts"
      display_name: "FinOps Alerts"
      email_subscribers:
        - "finops-team@acme.com"

  budgets:
    overall_monthly:
      name: "acme-overall-monthly"
      limit_amount: "10000"
      notifications:
        - threshold: 50
          subscriber_sns_topic_keys:
            - "finops"
        - threshold: 80
          subscriber_sns_topic_keys:
            - "finops"
        - threshold: 100
          notification_type: "FORECASTED"
          subscriber_sns_topic_keys:
            - "finops"

  anomaly_monitors:
    service_monitor:
      name: "acme-service-anomaly-monitor"

  anomaly_subscriptions:
    daily_alerts:
      name: "acme-daily-anomaly-alerts"
      frequency: "DAILY"
      threshold_amount: 50
      monitor_keys:
        - "service_monitor"
      subscribers:
        - type: "SNS"
          address: "finops"

# ── Account Factory Trigger ─────────────────────────────────────────────────
# Automatically triggers account-setup pipeline when Control Tower creates
# a new account. EventBridge → Lambda → GitHub Actions workflow_dispatch.
account_factory_trigger:
  enabled: true
  github_repo: "CloudPeer360/automates-iam-policy-deployment"
  github_workflow_id: "account-setup.yml"
  github_ref: "main"
  github_token_secret_arn: "arn:aws:secretsmanager:us-east-1:111111111111:secret:github-pat-XXXXXX"  # TODO: Update with real ARN
  notification_emails:
    - "platform-team@acme.com"
  skip_account_names:
    - "log-archive"
    - "audit"
    - "shared-services"
  #   - "platform-team@acme.com"

