    force_destroy: false
    lifecycle_rules: []
    allowed_account_ids: []
  access_log_bucket:
    enabled: true
    bucket_name: "acme-access-logs"
  cloudwatch_to_s3:
    enabled: false
    # firehose_name: "cloudwatch-to-s3"
