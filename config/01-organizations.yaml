# =============================================================================
# 01-Organizations — OUs, Accounts, Governance
# =============================================================================
# NOTE: When using the unified landing-zone stack (stacks/landing-zone/),
# OU and governance config is managed via config/landing-zone.yaml.
# This file is only used when deploying stacks/01-organizations/ independently.
# Do NOT deploy both stacks/landing-zone and stacks/01-organizations together
# as they would create state conflicts over the same OUs.
# =============================================================================

# ── Organizations ────────────────────────────────────────────────────────────
organizations:
  manage_organization: false
  feature_set: "ALL"

  organizational_units:
    security:
      name: "Security"
    infrastructure:
      name: "Infrastructure"
    workloads:
      name: "Workloads"
    sandbox:
      name: "Sandbox"
    workloads_prod:
      name: "Production"
      parent_key: "workloads"
    workloads_staging:
      name: "Staging"
      parent_key: "workloads"
    workloads_dev:
      name: "Development"
      parent_key: "workloads"

  # accounts:
